name: publisher-image

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publisher-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    uses: nicolaschan/publish-nix-image/.github/workflows/build-push.yml@master
    permissions:
      contents: read
      packages: write
    with:
      image: ghcr.io/elwang1128/friend.fish
