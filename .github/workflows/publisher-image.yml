name: publisher-image

# Builds the publisher Docker image from `flake.nix#docker` on amd64 and
# arm64 native runners, then combines them into a multi-arch manifest on
# GHCR. Per-arch images move between jobs as upload-artifact tarballs and
# get staged in a local registry; only the final multi-arch tags
# (`latest` and the 7-char commit SHA) are pushed to GHCR.
#
# Pull requests build on both arches but skip publishing.
#
# Run locally for the host arch:
#   nix build .#docker
#   docker load < result
#   docker run --rm -e RTSPS_SOURCE=rtsps://... friend-fish-publisher:latest

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publisher-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Build image
        run: nix build .#docker

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.arch }}
          path: result

  push:
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/download-artifact@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Stage per-arch images and push multi-arch manifest
        run: |
          set -euo pipefail
          repo_lower="${GITHUB_REPOSITORY,,}"
          image="ghcr.io/${repo_lower}"
          sha="${GITHUB_SHA::7}"
          archs=(amd64 arm64)
          staged=()

          for arch in "${archs[@]}"; do
            loaded=$(docker load < "docker-image-${arch}/result" | tail -n1 | awk '{print $NF}')
            staging="localhost:5000/friend-fish-publisher:${sha}-${arch}"
            docker tag "${loaded}" "${staging}"
            docker push "${staging}"
            staged+=("${staging}")
          done

          for tag in latest "${sha}"; do
            docker buildx imagetools create -t "${image}:${tag}" "${staged[@]}"
          done
